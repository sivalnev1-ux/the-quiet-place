<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- Outer decorative frame -->
  <path d="M60 4 L110 20 L116 60 L110 100 L60 136 L10 100 L4 60 L10 20 Z" 
        fill="#F6F2E8" stroke="#B08A3B" stroke-width="1.5"/>
  <path d="M60 12 L104 26 L110 62 L104 98 L60 128 L16 98 L10 62 L16 26 Z" 
        fill="none" stroke="#10362D" stroke-width="2"/>

  <!-- Top fleur-de-lis -->
  <text x="60" y="16" font-size="14" fill="#B08A3B" font-family="serif" text-anchor="middle">✦</text>

  <!-- Corner stars -->
  <text x="22" y="44" font-size="8" fill="#B08A3B" font-family="serif">✦</text>
  <text x="90" y="44" font-size="8" fill="#B08A3B" font-family="serif">✦</text>

  <!-- "The" text -->
  <text x="60" y="52" 
        font-family="Georgia, serif" 
        font-size="14"
        fill="#10362D" 
        text-anchor="middle"
        font-style="italic">The</text>

  <!-- "Quiet" text -->
  <text x="60" y="80" 
        font-family="Georgia, serif" 
        font-size="26"
        fill="#10362D" 
        text-anchor="middle">Quiet</text>

  <!-- "Place" text -->
  <text x="60" y="105" 
        font-family="Georgia, serif" 
        font-size="20"
        fill="#10362D" 
        text-anchor="middle">Place</text>

  <!-- Lantern small icon -->
  <g transform="translate(48, 58) scale(0.4)">
    <line x1="8" y1="8" x2="8" y2="40" stroke="#B08A3B" stroke-width="3" stroke-linecap="round"/>
    <path d="M8 8 Q8 2 14 2 Q20 2 20 8" stroke="#B08A3B" stroke-width="2" fill="none" stroke-linecap="round"/>
    <rect x="14" y="8" width="10" height="14" rx="1.5" fill="#B08A3B"/>
    <rect x="16" y="10" width="6" height="10" rx="1" fill="#F6F2E8" opacity="0.7"/>
    <path d="M13 8 L19 4 L25 8" fill="#B08A3B"/>
    <path d="M14 22 L16 26 L22 26 L24 22" fill="#B08A3B"/>
  </g>

  <!-- Bottom gold line -->
  <line x1="35" y1="115" x2="85" y2="115" stroke="#B08A3B" stroke-width="0.8" opacity="0.7"/>
</svg>
