<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Circle background -->
  <circle cx="40" cy="40" r="38" fill="#F6F2E8" stroke="#B08A3B" stroke-width="1.5"/>
  <circle cx="40" cy="40" r="34" fill="none" stroke="#10362D" stroke-width="1.5"/>

  <!-- Corner ornaments -->
  <text x="40" y="10" font-size="8" fill="#B08A3B" font-family="serif" text-anchor="middle">✦</text>
  <text x="40" y="76" font-size="8" fill="#B08A3B" font-family="serif" text-anchor="middle">✦</text>
  <text x="8" y="44" font-size="8" fill="#B08A3B" font-family="serif" text-anchor="middle">✦</text>
  <text x="72" y="44" font-size="8" fill="#B08A3B" font-family="serif" text-anchor="middle">✦</text>

  <!-- Large Q -->
  <text x="42" y="56"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="46"
        font-weight="normal"
        fill="#10362D"
        text-anchor="middle">Q</text>

  <!-- Lantern hanging from Q tail -->
  <g transform="translate(52, 48)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#B08A3B" stroke-width="1.5"/>
    <rect x="-4" y="10" width="8" height="10" rx="1" fill="#B08A3B"/>
    <rect x="-3" y="11" width="6" height="8" rx="1" fill="#F6F2E8" opacity="0.6"/>
    <path d="M-4 10 L0 7 L4 10" fill="#B08A3B"/>
    <path d="M-4 20 L-2 23 L2 23 L4 20" fill="#B08A3B"/>
  </g>
</svg>
